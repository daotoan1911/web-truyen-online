<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đọc chương - WebTruyenChu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <nav>
      <a href="index.html" class="logo">📖 WebTruyenChu</a>
      <button class="nav-toggle" onclick="document.querySelector('.nav-right').classList.toggle('open')">☰</button>
      <div class="nav-right">
        <a href="payment.html" class="nav-vip-btn">👑 VIP</a>
        <div id="navUser"></div>
      </div>
    </nav>
  </header>

  <div class="container">
    <div id="breadcrumb"></div>

    <div class="chapter-reader">
      <div id="chapterContent"></div>
    </div>

    <div id="chapterNav"></div>

    <div id="ad-sidebar" style="margin:16px 0"></div>

    <div class="comments-section">
      <h3>💬 Bình luận</h3>
      <div id="commentList"></div>
      <div class="comment-form">
        <textarea id="commentInput" placeholder="Viết bình luận của bạn..." rows="3"></textarea>
        <button onclick="postComment()">Gửi bình luận</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-col">
        <div class="footer-logo">📖 WebTruyenChu</div>
        <p>Trang đọc truyện online miễn phí.</p>
      </div>
      <div class="footer-col">
        <div class="footer-heading">Thể loại</div>
        <ul>
          <li><a href="index.html?genre=Ti%C3%AAn+Hi%E1%BB%87p">Tiên Hiệp</a></li>
          <li><a href="index.html?genre=Ng%C3%B4n+T%C3%ACnh">Ngôn Tình</a></li>
          <li><a href="index.html?genre=Ki%E1%BA%BFm+Hi%E1%BB%87p">Kiếm Hiệp</a></li>
          <li><a href="index.html?genre=Huy%E1%BB%81n+Huy%E1%BB%85n">Huyền Huyễn</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <div class="footer-heading">Liên kết</div>
        <ul>
          <li><a href="index.html">Trang chủ</a></li>
          <li><a href="payment.html">Nâng cấp VIP</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <div class="footer-heading">🛒 Ủng hộ</div>
        <div id="footer-shopee-slot"></div>
      </div>
    </div>
    <div class="footer-bottom">
      <span>© 2025 WebTruyenChu. All rights reserved.</span>
    </div>
  </footer>

  <script>
    const chapterId = new URLSearchParams(window.location.search).get('id');
    let currentChapter, chapters;

    async function loadChapter() {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      const headers = user ? { 'x-user-id': user._id } : {};
      const res = await fetch(`/chapters/${chapterId}`, { headers });
      currentChapter = await res.json();
      document.title = currentChapter.title + ' - WebTruyenChu';

      const contentHtml = currentChapter.content.replace(/\n/g, '<br>');

      document.getElementById('chapterContent').innerHTML = `
        <h2>${currentChapter.title}</h2>
        <div class="chapter-body ${currentChapter.isLocked ? 'chapter-locked' : ''}">${contentHtml}</div>
        ${currentChapter.isLocked ? `
        <div class="vip-gate">
          <div class="vip-gate-icon">👑</div>
          <div class="vip-gate-title">Chương VIP</div>
          <p>Nâng cấp VIP để đọc toàn bộ nội dung chương này và tất cả chương VIP khác.</p>
          <a href="payment.html" class="vip-gate-btn">⭐ Nâng cấp VIP ngay</a>
          ${!user ? `<a href="auth.html" class="vip-gate-login">Đã có tài khoản? Đăng nhập</a>` : ''}
        </div>` : ''}`;

      const storyRes = await fetch(`/stories/${currentChapter.storyId}`);
      const story = await storyRes.json();
      document.getElementById('breadcrumb').innerHTML =
        `<a href="index.html">Trang chủ</a> › <a href="story.html?id=${story._id}">${story.title}</a> › ${currentChapter.title}`;

      await loadChapterNav();
    }

    async function loadChapterNav() {
      const res = await fetch(`/chapters?storyId=${currentChapter.storyId}`);
      chapters = await res.json();
      const idx = chapters.findIndex(c => c._id === currentChapter._id);
      let nav = '';
      if (idx > 0)
        nav += `<a href="chapter.html?id=${chapters[idx - 1]._id}">← Chương trước</a>`;
      nav += `<a href="story.html?id=${currentChapter.storyId}">☰ Mục lục</a>`;
      if (idx < chapters.length - 1)
        nav += `<a href="chapter.html?id=${chapters[idx + 1]._id}">Chương tiếp →</a>`;
      document.getElementById('chapterNav').innerHTML = nav;
    }

    async function loadComments() {
      const res = await fetch(`/chapters/${chapterId}/comments`);
      const comments = await res.json();
      document.getElementById('commentList').innerHTML = comments.length
        ? comments.map(c => `
          <div class="comment">
            <div class="comment-header">
              <b>${c.userId?.username || 'Ẩn danh'}</b>
              <span class="comment-time">${new Date(c.createdAt).toLocaleString('vi-VN')}</span>
            </div>
            <p>${c.content}</p>
          </div>`).join('')
        : '<p class="no-comment">Chưa có bình luận nào. Hãy là người đầu tiên!</p>';
    }

    async function postComment() {
      const content = document.getElementById('commentInput').value.trim();
      if (!content) return;
      await fetch('/comments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chapterId, content })
      });
      document.getElementById('commentInput').value = '';
      loadComments();
    }

    loadChapter();
    loadComments();

    async function loadAds() {
      try {
        const res = await fetch('/ads');
        const ads = await res.json();
        const el = document.getElementById('ad-sidebar');
        if (!el) return;
        if (ads.sidebar && ads.sidebar.url) {
          el.innerHTML = ads.sidebar.imageUrl
            ? `<a href="${ads.sidebar.url}" target="_blank" rel="noopener sponsored">
                <img src="${ads.sidebar.imageUrl}" alt="Quảng cáo" style="max-width:336px;width:100%;height:auto;display:block;border-radius:8px;margin:0 auto">
               </a>`
            : `<a href="${ads.sidebar.url}" target="_blank" rel="noopener sponsored" class="ad-banner">📢 Quảng cáo</a>`;
        }
      } catch { }
    }
    loadAds();

    // Nav user
    const _u = JSON.parse(localStorage.getItem('user') || 'null');
    document.getElementById('navUser').innerHTML = _u
      ? `<a href="profile.html" class="nav-user-btn">👤 ${_u.username}</a>`
      : `<a href="auth.html" class="nav-user-btn">Đăng nhập</a>`;

    // Lưu lịch sử đọc
    if (_u) {
      fetch(`/users/${_u._id}/history`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chapterId })
      }).catch(() => { });
    }

    fetch('/ads').then(r => r.json()).then(ads => {
      const el = document.getElementById('footer-shopee-slot'); if (!el) return;
      const ad = ads.shopee;
      el.innerHTML = ad && ad.url ? `<a href="${ad.url}" target="_blank" rel="noopener sponsored" class="shopee-banner">${ad.imageUrl ? `<img src="${ad.imageUrl}" alt="Shopee">` : '🛒 Mua sắm trên Shopee'}</a>` : `<a href="#" class="shopee-banner" style="opacity:0.25">🛒 Shopee (chưa cấu hình)</a>`;
    }).catch(() => { });
  </script>
  <script src="floatAd.js"></script>
</body>

</html>
